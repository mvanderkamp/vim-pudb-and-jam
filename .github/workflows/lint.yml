---
name: Lint & Check

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            black==26.3.1 \
            isort==8.0.1 \
            flake8==7.3.0
      - name: Checking the code style with black
        run: |
          black --check pythonx
      - name: Checking import order
        run: |
          isort --profile black --check-only pythonx
      - name: Run flake8
        run: |
          flake8 --max-line-length 88
